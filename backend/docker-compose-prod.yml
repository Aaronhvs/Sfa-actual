version: "3.9"

services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true

  api:
    build:
      context: .
      dockerfile: enviroments/production/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    command: /start
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Sin ports: — la DB solo es accesible desde la red interna de Docker

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Sin ports: — Redis solo es accesible desde la red interna de Docker

  celery_worker:
    build:
      context: .
      dockerfile: enviroments/production/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      - SFA_NULLPOOL=1
    depends_on:
      - db
      - redis
    command: celery -A sfa.celery_app worker --loglevel=info

  celery_beat:
    build:
      context: .
      dockerfile: enviroments/production/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      - SFA_NULLPOOL=1
    depends_on:
      - db
      - redis
    command: celery -A sfa.celery_app beat --loglevel=info

volumes:
  postgres_data:
  traefik_certs:

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: enviroments/development/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: /start
    volumes:
      - .:/code

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: .
      dockerfile: enviroments/development/Dockerfile
    env_file:
      - .env
    environment:
      - SFA_NULLPOOL=1
    depends_on:
      - db
      - redis
    command: celery -A sfa.celery_app worker --loglevel=info
    volumes:
      - .:/code

  celery_beat:
    build:
      context: .
      dockerfile: enviroments/development/Dockerfile
    env_file:
      - .env
    environment:
      - SFA_NULLPOOL=1
    depends_on:
      - db
      - redis
    command: celery -A sfa.celery_app beat --loglevel=info
    volumes:
      - .:/code

volumes:
  postgres_data:
